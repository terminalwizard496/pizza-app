<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIAO PIZZERIA | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                        url('https://images.pexels.com/photos/1566837/pexels-photo-1566837.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* GIANT ITALIC HEADING OUTSIDE */
        .heading-outside {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 900;
            font-size: 5.5rem;
            color: #fbc531;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 4px 8px 25px rgba(0,0,0,0.8);
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 420px;
            text-align: center;
            color: white;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ITALIC HEADING INSIDE */
        .brand-name-inside {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
            font-size: 2.8rem;
            color: #fbc531;
            margin-bottom: 5px;
        }

        .login-title {
            font-size: 1rem;
            letter-spacing: 6px;
            font-weight: 300;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* INPUTS - TURNS WHITE ON FOCUS */
        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid transparent;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            transition: 0.3s ease;
        }

        input:focus {
            background-color: #ffffff !important;
            color: #000000 !important;
            outline: none;
            border-color: #fbc531;
            box-shadow: 0 0 20px rgba(251, 197, 49, 0.6);
        }

        /* REMOVE NUMBER ARROWS */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }

        button {
            width: 100%;
            padding: 16px;
            background: #fbc531;
            color: #1e272e;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        button:hover {
            background: #e1b12c;
            transform: translateY(-3px);
        }

        .hidden { display: none; }
        
        /* RESEND LINK STYLING */
        .otp-actions {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .otp-actions a {
            color: #fbc531;
            text-decoration: none;
            font-weight: 600;
        }

        #msg { margin-top: 20px; font-weight: 600; }

        @media (max-width: 600px) {
            .heading-outside { font-size: 3.2rem; }
            .brand-name-inside { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <h1 class="heading-outside">Ciao Pizzeria</h1>

    <div class="login-box">
        <h2 class="brand-name-inside">Ciao Pizzeria</h2>
        <h3 class="login-title">Login</h3>
        
        <div id="step1">
            <input type="text" id="name" placeholder="Full Name">
            <input type="number" id="phone" placeholder="Phone Number" inputmode="numeric">
            <button onclick="sendOTP()">Get OTP</button>
        </div>

        <div id="step2" class="hidden">
            <p style="margin-bottom: 15px; font-size: 0.85rem;">Check <code>otp_log.txt</code></p>
            <input type="number" id="otp" placeholder="4-Digit OTP" inputmode="numeric">
            <button onclick="verifyOTP()">Verify & Enter</button>
            
            <div class="otp-actions">
                <a href="#" onclick="location.reload()">Change Details</a>
                <a href="#" onclick="sendOTP()">Resend OTP</a>
            </div>
        </div>
        
        <p id="msg"></p>
    </div>

    <script>
        function sendOTP() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const msg = document.getElementById('msg');

            if (!name || phone.length !== 10) {
                msg.innerText = "❌ Enter name & 10-digit mobile.";
                msg.style.color = "#ff7675";
                return;
            }

            msg.innerText = "Sending OTP...";
            msg.style.color = "#fbc531";

            fetch('/send_otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    msg.innerText = "OTP Sent!";
                    msg.style.color = "#55efc4";
                } else {
                    msg.innerText = "❌ " + data.message;
                    msg.style.color = "#ff7675";
                }
            });
        }

        function verifyOTP() {
            const otp = document.getElementById('otp').value;
            fetch('/verify_otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({otp})
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) window.location.href = '/menu';
                else {
                    document.getElementById('msg').innerText = "❌ Incorrect OTP";
                    document.getElementById('msg').style.color = "#ff7675";
                }
            });
        }
    </script>
</body>
</html>
